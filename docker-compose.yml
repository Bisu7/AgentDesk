version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ai_customer_support_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_customer_support
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ai_customer_support_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_customer_support
      SECRET_KEY: a-very-long-and-extremely-secure-random-secret-key-123456
      JWT_SECRET_KEY: another-very-long-and-extremely-secure-jwt-key-654321
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ai_customer_support_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
